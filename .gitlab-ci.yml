stages:
  - build
  - test

build-job:
  stage: build
  script:
    - echo "Hello from Build stage!"
    - mkdir -p build
    - echo "Build complete" > build/info.txt
  artifacts:
    paths:
      - build/

test-job:
  stage: test
  script:
    - echo "Hello from Test stage!"
    - cat build/info.txt
    - echo "All tests passed!"
  dependencies:
    - build-job